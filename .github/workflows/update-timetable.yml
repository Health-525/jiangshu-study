name: Update Timetable.md

on:
  schedule:
    # 07:10 Beijing Time = 23:10 UTC (previous day)
    - cron: "10 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jiangshu-study
        uses: actions/checkout@v4

      - name: Checkout timetable repo
        uses: actions/checkout@v4
        with:
          repository: Health-525/timetable
          path: _timetable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Timetable.md (text only)
        run: |
          python3 - <<'PY'
          import json, re
          from datetime import date, datetime, timedelta
          from zoneinfo import ZoneInfo
          from pathlib import Path

          TZ = ZoneInfo('Asia/Shanghai')
          repo = Path('.')
          tt = Path('_timetable')
          data = json.loads((tt/'data'/'schedule.json').read_text(encoding='utf-8'))

          week1 = date.fromisoformat(data['meta']['week1_monday'])
          period_times = data.get('periodTimes', {})

          def week_index(d: date) -> int:
              return (d - week1).days // 7 + 1

          def in_week(spec: str, w: int) -> bool:
              for part in spec.split(','):
                  part = part.strip()
                  if not part:
                      continue
                  if '-' in part:
                      a,b = part.split('-',1)
                      if int(a) <= w <= int(b):
                          return True
                  else:
                      if int(part) == w:
                          return True
              return False

          TIME_RE = re.compile(r'(\d{2}:\d{2})')
          def start_time(period_or_time: str) -> str:
              m = TIME_RE.search(period_or_time)
              return m.group(1) if m else period_or_time.strip()

          courses = data.get('courses', [])
          now = datetime.now(TZ)
          today = now.date()
          monday = today - timedelta(days=today.weekday())
          sunday = monday + timedelta(days=6)
          w = week_index(monday)

          # build day -> list of entries
          by_day = {i: [] for i in range(1,8)}
          for c in courses:
              if not in_week(c.get('weeks',''), w):
                  continue
              wd = int(c.get('weekday'))
              periods = [int(x) for x in c.get('periods', [])]
              if not periods:
                  continue
              ps, pe = min(periods), max(periods)
              t = f"第{ps}-{pe}节 {period_times.get(str(ps),'')[:5]}-{period_times.get(str(pe),'')[-5:]}" if str(ps) in period_times and str(pe) in period_times else f"第{ps}-{pe}节"
              by_day[wd].append((ps, t, c.get('title',''), c.get('location','')))

          for wd in by_day:
              by_day[wd].sort(key=lambda x: x[0])

          # today's weekday mapping: 1=Mon ... 7=Sun
          wd_today = today.weekday() + 1
          today_entries = by_day.get(wd_today, [])

          def day_label(d: date) -> str:
              wd = ['周一','周二','周三','周四','周五','周六','周日'][d.weekday()]
              return f"{wd}（{d.strftime('%m-%d')}）"

          lines = []
          lines += ['# 课程表', '', '> 自动更新，请勿手工编辑', '']
          lines += [f"更新时间：**{now.strftime('%Y-%m-%d %H:%M')}**（北京时间）", '']

          # 今日
          header = f"{today.isoformat()}（第{week_index(today)}周 {['周一','周二','周三','周四','周五','周六','周日'][today.weekday()]}）"
          lines += [f"## 今日课表（{header}）", '']
          if not today_entries:
              lines += ["> 今日：**无课**", '', '- 无课', '']
          else:
              first = today_entries[0]
              lines += [f"> 今日：**{len(today_entries)} 节课**；第一节：**{start_time(first[1])}** {first[2]}（{first[3]}）", '']
              for _ps, t, title, loc in today_entries:
                  st = start_time(t)
                  locp = f"（{loc}）" if loc else ''
                  lines.append(f"- **{st}** {title}{locp}")
              lines.append('')

          # 本周
          lines += [f"## 本周课表（{monday.isoformat()} ~ {sunday.isoformat()}｜第{w}周）", '']
          # week summary line
          has = []
          for i in range(7):
              d = monday + timedelta(days=i)
              wd = d.weekday()+1
              cnt = len(by_day.get(wd, []))
              if cnt:
                  has.append(f"{['一','二','三','四','五','六','日'][i]}({cnt})")
          lines += ["> 有课日：" + ('、'.join(has) if has else '无'), '']

          for i in range(7):
              d = monday + timedelta(days=i)
              wd = d.weekday()+1
              entries = by_day.get(wd, [])
              lines += [f"### {day_label(d)}", '']
              if not entries:
                  lines += ['- 无课', '']
                  continue
              lines += [f"- 共 **{len(entries)}** 节", '']
              for _ps, t, title, loc in entries:
                  st = start_time(t)
                  locp = f"（{loc}）" if loc else ''
                  lines.append(f"- **{st}** {title}{locp}")
              lines.append('')

          (repo/'Timetable.md').write_text('\n'.join(lines).rstrip()+'\n', encoding='utf-8')
          PY

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Timetable.md
          git commit -m "chore: auto-update Timetable.md"
          git push
