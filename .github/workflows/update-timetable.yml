name: Update Timetable.md

on:
  schedule:
    # 07:10 Beijing Time = 23:10 UTC (previous day)
    - cron: "10 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jiangshu-study
        uses: actions/checkout@v4

      - name: Checkout timetable repo
        uses: actions/checkout@v4
        with:
          repository: Health-525/timetable
          path: _timetable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Timetable.md (text only)
        run: |
          python3 - <<'PY'
          import json, re
          from datetime import date, datetime, timedelta
          from zoneinfo import ZoneInfo
          from pathlib import Path

          TZ = ZoneInfo('Asia/Shanghai')
          repo = Path('.')
          tt = Path('_timetable')
          data = json.loads((tt/'data'/'schedule.json').read_text(encoding='utf-8'))

          week1 = date.fromisoformat(data['meta']['week1_monday'])
          period_times = data.get('periodTimes', {})

          # 课程简称映射
          ABBR = {
              '大数据技术基础': '大数据基础',
              'Python数据处理与分析': 'Python数据',
              '数据结构与算法': '数据结构',
              '多元统计分析': '多元统计',
              '数值分析': '数值分析',
              '数学模型与数学软件': '数学模型',
              '毛泽东思想和中国特色社会主义理论体系概论': '毛概',
              '马克思主义基本原理': '马原',
          }
          def abbr(title: str) -> str:
              for k, v in ABBR.items():
                  if k in title:
                      return v
              if '体育' in title:
                  return '体育'
              return title[:6]

          # 地点简化：去掉括号内容，保留楼栋+房间号
          def short_loc(loc: str) -> str:
              loc = re.sub(r'[（(][^）)]*[）)]', '', loc).strip()
              return loc

          def week_index(d: date) -> int:
              return (d - week1).days // 7 + 1

          def in_week(spec: str, w: int) -> bool:
              for part in spec.split(','):
                  part = part.strip()
                  if not part:
                      continue
                  if '-' in part:
                      a, b = part.split('-', 1)
                      if int(a) <= w <= int(b):
                          return True
                  else:
                      if int(part) == w:
                          return True
              return False

          TIME_RE = re.compile(r'(\d{2}:\d{2})')
          def start_time(s: str) -> str:
              m = TIME_RE.search(s)
              return m.group(1) if m else s.strip()

          courses = data.get('courses', [])
          now = datetime.now(TZ)
          today = now.date()
          monday = today - timedelta(days=today.weekday())
          sunday = monday + timedelta(days=6)
          w = week_index(monday)

          by_day = {i: [] for i in range(1, 8)}
          for c in courses:
              if not in_week(c.get('weeks', ''), w):
                  continue
              wd = int(c.get('weekday'))
              periods = [int(x) for x in c.get('periods', [])]
              if not periods:
                  continue
              ps, pe = min(periods), max(periods)
              t = (f"{period_times.get(str(ps),'')[:5]}"
                   if str(ps) in period_times else f"第{ps}节")
              by_day[wd].append((ps, t, c.get('title', ''), c.get('location', '')))

          for wd in by_day:
              by_day[wd].sort(key=lambda x: x[0])

          wd_today = today.weekday() + 1
          today_entries = by_day.get(wd_today, [])

          DAY_NAMES = ['周一','周二','周三','周四','周五','周六','周日']

          def day_label(d: date) -> str:
              return f"{DAY_NAMES[d.weekday()]}（{d.strftime('%m-%d')}）"

          def render_table(entries: list) -> list[str]:
              rows = ['| 时间  | 课程       | 地点       |',
                      '|-------|------------|------------|']
              for _ps, t, title, loc in entries:
                  rows.append(f"| {start_time(t)} | {abbr(title)} | {short_loc(loc)} |")
              return rows

          lines = []
          lines += ['# 课程表', '', f"> 更新时间：{now.strftime('%Y-%m-%d %H:%M')}（北京时间）", '']
          lines += ['---', '']

          # 今日
          today_label = f"{DAY_NAMES[today.weekday()]}（{today.strftime('%m-%d')}）· 第{week_index(today)}周"
          lines += [f"## 今日 · {today_label}", '']
          if not today_entries:
              lines += ['> 🎉 今日无课', '']
          else:
              first = today_entries[0]
              lines += [f"> 📌 共 **{len(today_entries)}** 节 · 第一节 **{start_time(first[1])}** {abbr(first[2])}（{short_loc(first[3])}）", '']
              lines += render_table(today_entries)
              lines.append('')
          lines += ['---', '']

          # 本周
          has = [f"{['一','二','三','四','五','六','日'][i]}({len(by_day[i+1])})"
                 for i in range(7) if by_day[i+1]]
          lines += [f"## 本周 · 第{w}周（{monday.strftime('%m-%d')} ~ {sunday.strftime('%m-%d')}）", '']
          lines += [f"> 📅 有课日：{'　'.join(has) if has else '无'}", '']

          for i in range(7):
              d = monday + timedelta(days=i)
              wd = d.weekday() + 1
              entries = by_day.get(wd, [])
              lines += ['---', '', f"### {day_label(d)}", '']
              if not entries:
                  lines += ['> 无课', '']
              else:
                  lines += render_table(entries)
                  lines.append('')

          (repo / 'Timetable.md').write_text('\n'.join(lines).rstrip() + '\n', encoding='utf-8')
          PY

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Timetable.md
          git commit -m "chore: auto-update Timetable.md"
          git push
