name: Update Timetable.md

on:
  schedule:
    # 07:10 Beijing Time = 23:10 UTC (previous day)
    - cron: "10 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jiangshu-study
        uses: actions/checkout@v4

      - name: Checkout timetable repo
        uses: actions/checkout@v4
        with:
          repository: Health-525/timetable
          path: _timetable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate timetable (daily + weekly SVG)
        env:
          TIMETABLE_DIR: ${{ github.workspace }}/_timetable
        run: |
          python3 scripts/update_timetable_md.py
          python3 scripts/render_week_grid_svg.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Timetable.md assets/week-grid.svg
          git commit -m "chore: auto-update timetable"
          git push
